name: Daily Gun Van Scraper & Deploy

on:
  schedule:
    - cron: '2 3 * * *' # Scheduled for 03:02 UTC every day
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node Environment
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: 'npm'

      - name: Setup Headless Google Chrome Engine
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Dependencies
        run: npm ci

      - name: Run Scraper Script
        run: node scripts/update-gunvan.js

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add public/api/gunvan.json
          git commit -m "🤖 Auto-update Gun Van location data assets" || echo "No changes to commit"
          git push

      - name: Install, build, and upload static site bundles
        uses: withastro/action@v3
        with:
          path: .
          node-version: 22

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
